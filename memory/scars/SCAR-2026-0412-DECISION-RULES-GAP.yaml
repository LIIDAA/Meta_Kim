scar:
  id: SCAR-2026-0412-DECISION-RULES-GAP
  type: governance-gap
  triggered_by: "8-agent governance self-test - Decision Rules audit"
  what_happened: >
    Self-test discovered that meta-warden.md and meta-conductor.md were missing Decision Rules
    sections. Additionally, .claude/agents/meta-prism.md and .claude/agents/meta-sentinel.md
    were out of sync with canonical versions (v1.0.8 vs v1.0.9).
  root_cause: >
    Design Gap: meta-warden and meta-conductor were not updated when Decision Rules
    became a required section for all meta agents.
    Sync Gap: canonical agents were updated to v1.0.9 with Decision Rules, but
    runtime projections were not synced.
  impact: improved
  lesson_learned: >
    Decision Rules must be a mandatory section for ALL meta agents. When updating
    the canonical definition of any meta agent, always:
    1. Add/update Decision Rules section
    2. Run npm run sync:runtimes immediately
    3. Verify runtime projections have the same version number
  prevention_rule: >
    Add Decision Rules to the required sections checklist for meta agent creation/update.
    Run sync:runtimes as part of the canonical update workflow, not as a separate step.
    Include Decision Rules presence check in validation scripts.
